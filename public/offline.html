<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#102035" />
    <title>8Bit Legends | Offline</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: 'Trebuchet MS', 'Segoe UI', sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(78, 121, 185, 0.35), transparent 42%),
          linear-gradient(180deg, #102035 0%, #0b1627 100%);
        color: #f8f3e6;
      }

      main {
        width: min(520px, 92vw);
        border: 3px solid #5d7aa5;
        border-radius: 16px;
        padding: 1.1rem 1rem;
        background: rgba(7, 13, 23, 0.88);
        box-shadow: 0 14px 28px rgba(0, 0, 0, 0.34);
        text-align: center;
      }

      h1 {
        margin: 0 0 0.5rem;
        color: #f4c25b;
      }

      p {
        margin: 0.35rem 0;
        line-height: 1.45;
      }

      a {
        display: inline-block;
        margin-top: 0.8rem;
        padding: 0.65rem 1rem;
        border-radius: 10px;
        color: #f8f3e6;
        text-decoration: none;
        background: linear-gradient(180deg, #385e99, #2a4677);
        border: 2px solid #e7b95a;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>⚔️ 8Bit Legends</h1>
      <p>Você está offline no momento.</p>
      <p>Se o jogo já foi aberto antes, volte para a tela principal e continue sua aventura normalmente.</p>
      <a href="/">Tentar novamente</a>
    </main>
  </body>
</html>
